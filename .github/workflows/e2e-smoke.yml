name: Blackbox E2E Smoke Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  e2e:
    name: Playwright smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build

      - name: Start web server
        run: |
          nohup npm start >server.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:3000 >/dev/null; then
              echo "Server ready"
              exit 0
            fi
            sleep 2
          done
          echo "Server did not start in time"
          cat server.log || true
          exit 1

      - name: Run smoke tests
        run: npx playwright test tests/e2e/smoke.spec.ts --reporter=github
        env:
          BASE_URL: http://127.0.0.1:3000
        continue-on-error: true

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
          compression-level: 9
        continue-on-error: true

      - name: Auto-create issue on E2E failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --repo CatNoted/catnoted-canvas \
            --title "🛡️ Sentinel: [BLACKBOX] E2E smoke test failed on main" \
            --label bug --label sentinel \
            --body "E2E smoke tests failed on \`main\`.\n\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\nCommit: ${{ github.sha }}\n\nPlease investigate canvas app startup and critical routes."
