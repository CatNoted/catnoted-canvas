name: Close referenced issues on PR merge

on:
  pull_request:
    types:
      - closed

jobs:
  close-issues:
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.merged == true && github.repository == 'CatNoted/catnoted-canvas' }}
    steps:
      - name: Close referenced issues
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const regex = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
            const matches = [...new Set(Array.from(body.matchAll(regex)).map(m => m[1]))];
            for (const issue of matches) {
              try {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: Number(issue),
                  state: 'closed'
                });
              } catch (e) {
                console.warn('Failed closing issue #' + issue + ': ' + e.message);
              }
            }
